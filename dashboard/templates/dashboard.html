<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SmartGate Proxy Dashboard</title>

    <style>
      :root {
        --bg: #000000;
        --surface-1: #000000;
        --surface-2: #050505;
        --border: #444444;
        --text-primary: #ffffff;
        --text-secondary: #ffffff;
        --accent: #ff7a00;
        --accent-strong: #ffffff;
        --success: #00ff66;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: var(--bg);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 230px;
        height: 100vh;
        background: var(--surface-1);
        border-right: 4px solid var(--accent);
        padding-top: 20px;
        z-index: 1000;
      }

      .sidebar h2 {
        color: var(--accent);
        text-align: center;
        margin-bottom: 25px;
        letter-spacing: 1px;
        font-weight: 900;
      }

      .sidebar a {
        display: block;
        padding: 14px 22px;
        color: var(--text-secondary);
        text-decoration: none;
        border-left: 4px solid transparent;
        transition: 0.1s;
        font-weight: bold;
      }

      .sidebar a:hover {
        background: var(--accent);
        color: #000;
        border-left: 4px solid #fff;
      }

      .main {
        margin-left: 230px;
        padding: 24px;
      }

      section {
        background: var(--surface-2);
        padding: 22px;
        margin-bottom: 22px;
        border: 2px solid var(--border);
        border-left: 6px solid var(--accent);
      }

      h2 {
        color: var(--accent);
        margin-bottom: 12px;
        text-transform: uppercase;
        font-size: 1.2rem;
      }

      button {
        background: var(--accent);
        color: #000;
        border: 2px solid var(--accent);
        padding: 10px 18px;
        margin: 6px 6px 6px 0;
        cursor: pointer;
        font-weight: 900;
        border-radius: 0px;
        transition: 0.1s;
        text-transform: uppercase;
      }

      button:hover {
        background: var(--accent-strong);
        border-color: #ffffff;
        color: #000;
      }

      input {
        padding: 10px;
        background: #000;
        color: #fff;
        border: 2px solid #ffffff;
        margin-right: 8px;
        font-weight: bold;
      }

      input:focus {
        outline: 3px solid var(--accent);
        border-color: var(--accent);
      }

      .console-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .console,
      .log-console {
        background: #000;
        height: 260px;
        overflow-y: auto;
        padding: 12px;
        font-family: 'Courier New', monospace;
        border: 2px solid #ffffff;
        white-space: pre-line;
        font-size: 0.95rem;
      }

      .console {
        color: var(--success);
      }

      .log-console {
        color: #ffffff;
      }

      ul {
        list-style: none;
        padding: 12px;
        background: #000;
        border: 2px solid var(--border);
      }

      li {
        padding: 8px 0;
        border-bottom: 1px solid #222;
      }

      @media (max-width: 768px) {
        .console-wrap {
          grid-template-columns: 1fr;
        }
        .sidebar {
          transform: translateX(-105%);
        }
        .main {
          margin-left: 0 !important;
        }
        button {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>SmartGate</h2>
      <a href="#controls">Squid Controls</a>
      <a href="#actions">Site Control</a>
      <a href="#lists">Blocked Sites</a>
      <a href="#console">Console</a>
    </div>

    <div class="main">
      <section id="controls">
        <h2>Squid Controls</h2>
        Status: <span id="statusText">Loading...</span><br /><br />
        <button onclick="start()">Start</button>
        <button onclick="stop()">Stop</button>
        <button onclick="restart()">Restart</button>
        <button onclick="reload()">Reload</button>
      </section>

      <section id="actions">
        <h2>Site Control</h2>
        <input id="siteInput" placeholder="example.com" />
        <button onclick="block()">Block</button>
        <button onclick="unblock()">Unblock</button>
        <button onclick="clearList()">Clear list</button>
      </section>

      <section id="lists">
        <h2>Blocked Sites</h2>
        <ul id="blockedList"></ul>
      </section>
      <section>
        <h2>Cache Hit Rate</h2>

        <button onclick="clearLogs()">Clear Log</button>
        <button onclick="clearCache()">Clear Cache</button>
        <div style="background: #111; border: 2px solid #fff; height: 30px">
          <div
            id="hitBar"
            style="height: 100%; width: 0%; background: #00ff66"
          ></div>
        </div>
        <p id="hitText">Loading...</p>
      </section>
      <section id="console">
        <h2>System & Log Console</h2>
        <div class="console-wrap">
          <div>
            <h3 style="color: #ff7a00; margin-bottom: 6px">System Console</h3>
            <div id="consoleBox" class="console"></div>
          </div>
          <div>
            <h3 style="color: #ff7a00; margin-bottom: 6px">Live Access Logs</h3>
            <div id="logConsole" class="log-console"></div>
          </div>
        </div>
      </section>
    </div>

    <script>
      function log(msg) {
        if (!msg) return;
        let box = document.getElementById('consoleBox');
        box.innerText += msg + '\n';
        box.scrollTop = box.scrollHeight;
      }

      function logAccess(msg) {
        if (!msg) return;
        let box = document.getElementById('logConsole');
        box.innerText += msg + '\n';
        box.scrollTop = box.scrollHeight;
      }

      async function start() {
        let r = await fetch('/squid/start', { method: 'POST' });
        let d = await r.json();
        log(d.output || d.error);
      }

      async function stop() {
        let r = await fetch('/squid/stop', { method: 'POST' });
        let d = await r.json();
        log(d.output || d.error);
      }

      async function restart() {
        let r = await fetch('/squid/restart', { method: 'POST' });
        let d = await r.json();
        log(d.output || d.error);
      }

      async function reload() {
        let r = await fetch('/squid/reload', { method: 'POST' });
        let d = await r.json();
        log(d.output || d.error);
      }

      async function clearLogs() {
        let r = await fetch('/squid/clear-log', { method: 'POST' });
        let d = await r.json();

        log(d.output || d.error || 'Log cleared');

        // refresh UI logs
        streamLogs();
      }

      async function block() {
        let site = document.getElementById('siteInput').value;
        let r = await fetch('/block', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ site }),
        });
        let d = await r.json();
        log(d.output || d.error);
        loadList();
      }

      async function unblock() {
        let site = document.getElementById('siteInput').value;
        let r = await fetch('/unblock', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ site }),
        });
        let d = await r.json();
        log(d.output || d.error);
        loadList();
      }

      async function clearList() {
        let r = await fetch('/clear', { method: 'POST' });
        let d = await r.json();
        log(d.output || d.error);
        loadList();
      }

      async function loadList() {
        let r = await fetch('/lists');
        let d = await r.json();
        document.getElementById('blockedList').innerHTML = d.blocked
          .map((x) => `<li>${x}</li>`)
          .join('');
      }

      async function refreshStatus() {
        let r = await fetch('/squid/status');
        let d = await r.json();
        let el = document.getElementById('statusText');

        if (d.status === 'active') {
          el.innerText = 'ACTIVE';
          el.style.color = '#00ff66';
        } else if (d.status === 'inactive') {
          el.innerText = 'INACTIVE';
          el.style.color = 'red';
        } else {
          el.innerText = 'UNKNOWN';
          el.style.color = 'orange';
        }
      }

      async function streamLogs() {
        let r = await fetch('/squid/logs');
        let logs = await r.json();

        let box = document.getElementById('logConsole');
        box.innerText = '';

        logs.forEach((log) => {
          logAccess(`${log.date}  ${log.time}  ${log.ip}  ${log.site}`);
        });
      }

      async function clearCache() {
        let r = await fetch('/squid/clear-cache', { method: 'POST' });
        let d = await r.json();

        log(d.output || d.error || 'Cache cleared');

        // optional refresh logs/status
        refreshStatus();
      }

      let lastShown = '';

      async function streamCronLogs() {
        let r = await fetch('/squid/cron-log');
        let d = await r.json();

        if (!d.last) return;

        // show ONLY new event
        if (d.last !== lastShown) {
          lastShown = d.last;

          let box = document.getElementById('consoleBox');
          box.innerText += d.last + '\n';

          box.scrollTop = box.scrollHeight;
        }
      }

      async function updateHitRate() {
        let r = await fetch('/squid/hit-rate');
        let d = await r.json();

        let rate = d.hit_rate || 0;

        document.getElementById('hitBar').style.width = rate + '%';
        document.getElementById('hitText').innerText =
          `Cache Hit Rate: ${rate}%`;
      }

      setInterval(updateHitRate, 1000);

      window.onload = function () {
        refreshStatus();
        loadList();
        streamLogs();
      };

      setInterval(refreshStatus, 3000);
      setInterval(streamLogs, 4000);
      setInterval(streamCronLogs, 3000);
    </script>
  </body>
</html>
