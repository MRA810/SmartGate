<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SmartGate Proxy Dashboard</title>

    <style>
      /* RESET */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      /* BODY (IMPORTANT: NO FLEX) */
      body {
        background: #0b0b0b;
        color: #eee;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* SIDEBAR */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 230px;
        height: 100vh;

        background: #111;
        border-right: 2px solid #ff7a00;

        padding-top: 20px;
        z-index: 1000;
      }

      .sidebar h2 {
        color: #ff7a00;
        text-align: center;
        margin-bottom: 20px;
      }

      .sidebar a {
        display: block;
        padding: 12px 20px;
        color: #ccc;
        text-decoration: none;
        transition: 0.2s;
      }

      .sidebar a:hover {
        background: #ff7a00;
        color: #000;
      }

      /* MAIN CONTENT */
      .main {
        margin-left: 230px;
        padding: 20px;
      }

      /* SECTIONS */
      section {
        background: #111;
        padding: 20px;
        margin-bottom: 20px;
        border: 1px solid #222;
        border-left: 3px solid #ff7a00;
      }

      h2 {
        color: #ff7a00;
        margin-bottom: 10px;
      }

      /* BUTTONS */
      button {
        background: #ff7a00;
        border: none;
        padding: 8px 12px;
        margin: 5px 5px 5px 0;
        cursor: pointer;
        font-weight: bold;
        border-radius: 4px;
      }

      button:hover {
        background: #ff8f2a;
      }

      /* INPUTS */
      input {
        padding: 8px;
        background: #000;
        color: #fff;
        border: 1px solid #333;
        margin-right: 8px;
      }

      /* CONSOLE */
      .console {
        background: #000;
        color: #00ff66;
        height: 260px;
        overflow-y: auto;
        padding: 10px;
        font-family: monospace;
        border: 1px solid #333;
        white-space: pre-line;
      }

      /* LIST */
      ul {
        list-style: none;
        padding: 10px;
        background: #000;
        border: 1px solid #333;
      }

      li {
        padding: 4px 0;
        color: #ccc;
      }

      /* MOBILE-FIRST FIX */
      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          height: 100vh;
          width: 260px;

          transform: translateX(-105%);
          transition: transform 0.25s ease;

          z-index: 9999;
        }

        .sidebar.active {
          transform: translateX(0);
        }

        .main {
          margin-left: 0 !important;
          padding: 12px;
        }

        .toggle-btn {
          display: block;
        }

        /* FIX BUTTON LAYOUT */
        button {
          width: 100%;
          margin: 6px 0;
        }

        /* FIX INPUT OVERFLOW */
        input {
          width: 100%;
        }

        /* STACK BUTTON GROUPS CLEANLY */
        section {
          display: flex;
          flex-direction: column;
          gap: 10px;
        }
      }
    </style>
  </head>

  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>SmartGate</h2>
      <a href="#controls">Squid Controls</a>
      <a href="#actions">Site Control</a>
      <a href="#lists">Blocked Sites</a>
      <a href="#console">Console</a>
    </div>

    <!-- MAIN -->
    <div class="main">
      <!-- CONTROLS -->
      <section id="controls">
        <h2>Squid Controls</h2>
        <div id="squidStatus" style="margin-top: 10px; font-weight: bold">
          Status: <span id="statusText">Loading...</span>
        </div>
        <br />
        <button onclick="start()">Start</button>
        <button onclick="stop()">Stop</button>
        <button onclick="restart()">Restart</button>
        <button onclick="reload()">Reload</button>
      </section>

      <!-- ACTIONS -->
      <section id="actions">
        <h2>Site Control</h2>

        <input id="siteInput" placeholder="example.com" />

        <button onclick="block()">Block</button>
        <button onclick="unblock()">Unblock</button>
        <button onclick="clearList()">Clear list</button>
      </section>

      <!-- LIST -->
      <section id="lists">
        <h2>Blocked Sites</h2>
        <ul id="blockedList"></ul>
      </section>

      <!-- CONSOLE -->
      <section id="console">
        <h2>System Console</h2>
        <div id="consoleBox" class="console"></div>
      </section>
    </div>

    <script>
      function log(msg) {
        if (!msg) return;
        document.getElementById('consoleBox').innerText += msg + '\n';
        document.getElementById('consoleBox').scrollTop =
          document.getElementById('consoleBox').scrollHeight;
      }

      /* SQUID */
      async function start() {
        let r = await fetch('/squid/start', { method: 'POST' });
        let d = await r.json();
        log(d.output || d.error);
      }

      async function stop() {
        let r = await fetch('/squid/stop', { method: 'POST' });
        let d = await r.json();
        log(d.output || d.error);
      }

      async function restart() {
        let r = await fetch('/squid/restart', { method: 'POST' });
        let d = await r.json();
        log(d.output || d.error);
      }

      async function reload() {
        let r = await fetch('/squid/reload', { method: 'POST' });
        let d = await r.json();
        log(d.output || d.error);
      }

      /* BLOCK */
      async function block() {
        let site = document.getElementById('siteInput').value;

        let r = await fetch('/block', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ site }),
        });

        let d = await r.json();
        log(d.output || d.error);
        loadList();
      }

      /* UNBLOCK */
      async function unblock() {
        let site = document.getElementById('siteInput').value;

        let r = await fetch('/unblock', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ site }),
        });

        let d = await r.json();
        log(d.output || d.error);
        loadList();
      }

      /* CLEAR LIST */
      async function clearList() {
        let r = await fetch('/clear', { method: 'POST' });
        let d = await r.json();
        log(d.output || d.error);
        loadList();
      }

      /* LOAD LIST */
      async function loadList() {
        let r = await fetch('/lists');
        let d = await r.json();

        document.getElementById('blockedList').innerHTML = d.blocked
          .map((x) => `<li>${x}</li>`)
          .join('');
      }

      /* REFRESH STATUS */
      async function refreshStatus() {
        let r = await fetch('/squid/status');
        let d = await r.json();

        let el = document.getElementById('statusText');

        if (d.status === 'active') {
          el.innerText = 'ACTIVE';
          el.style.color = '#00ff66';
        } else if (d.status === 'inactive') {
          el.innerText = 'INACTIVE';
          el.style.color = 'red';
        } else {
          el.innerText = 'UNKNOWN';
          el.style.color = 'orange';
        }
      }

      window.onload = function () {
        refreshStatus();
      };

      setInterval(refreshStatus, 3000);

      loadList();
    </script>
  </body>
</html>
